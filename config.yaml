# Paper trading only by default.
# Set live: true ONLY when you are ready for real-money trading.
live: false

# Symbols to watch and trade.
symbols:
  - SPY
  - AAPL
  - MSFT
  - NVDA

risk:
  max_position_usd: 50000     # Maximum notional value per position (USD)
  stop_loss_pct: 1.0          # Stop loss % used by strategies to compute signal stop prices
  daily_loss_limit_usd: 500   # Flatten all & halt trading if daily P&L drops below this
  max_open_positions: 4       # Maximum number of concurrent open positions
  trailing_stop_pct: 10.0     # Trailing stop % that follows the price to lock in gains
  loser_cut_pct: 7.0          # Auto-exit any position whose unrealized loss exceeds this %

ai:
  enable_research: false      # Set true + add PERPLEXITY_API_KEY to .env for pre-market research
  enable_claude_filter: false # Set true + add ANTHROPIC_API_KEY to .env for Claude signal approval

strategy:
  name: orb                   # "orb", "ema", or "donchian"

  orb:
    opening_range_minutes: 15    # Observe 09:30–09:45 ET to set the range
    entry_order_type: limit      # "limit" or "market"
    eod_exit_time: "15:50"       # Flatten all positions at this time ET

  ema:
    fast_period: 9               # Fast EMA period (minutes)
    slow_period: 21              # Slow EMA period (minutes)
    entry_order_type: market     # "limit" or "market"  (market recommended for EMA)
    eod_exit_time: "15:50"       # Flatten all positions at this time ET

  donchian:
    lookback_days: 40            # N-day channel: buy breakout above N-day high
    trend_ma: 200                # Only trade in direction of N-day MA (0 = off)
    trailing_activation_pct: 1.0 # Activate trailing stop after X% profit
    trailing_pct: 8.0            # Trail X% below the peak price
    long_only: true              # Only take long (buy) positions
